server:
  port: 8082

spring:
  application:
    name: case-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/chainguard_casehub}
    username: ${POSTGRES_USER:chainguard}
    password: ${POSTGRES_PASSWORD:chainguard}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:chainguard-demo-secret-key-must-be-at-least-32-bytes}

management:
  endpoints:
    web:
      exposure:
        include: health,info
