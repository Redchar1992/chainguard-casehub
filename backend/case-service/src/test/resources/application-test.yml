spring:
  datasource:
    url: jdbc:h2:mem:casetest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false

security:
  jwt:
    secret: chainguard-demo-secret-key-must-be-at-least-32-bytes
