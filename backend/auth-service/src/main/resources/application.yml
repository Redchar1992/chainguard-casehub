server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/chainguard_casehub}
    username: ${POSTGRES_USER:chainguard}
    password: ${POSTGRES_PASSWORD:chainguard}
  jpa:
    hibernate:
      # case-service owns the Flyway schema; auth-service reads users/roles only.
      ddl-auto: none
    open-in-view: false

security:
  jwt:
    # Demo-only shared secret. Override with SECURITY_JWT_SECRET in real deployments.
    secret: ${SECURITY_JWT_SECRET:chainguard-demo-secret-key-must-be-at-least-32-bytes}
    expiration-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info
