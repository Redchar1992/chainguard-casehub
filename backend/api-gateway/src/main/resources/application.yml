server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: case-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/cases/**
        - id: risk-engine-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/risk/**
        - id: ai-investigator-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
