server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
            allowedMethods:
              - GET
              - POST
              - PATCH
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: case-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/cases/**
        - id: rule-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/rules/**
        - id: risk-engine-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/risk/**
        - id: ai-investigator-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/ai/**

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:chainguard-demo-secret-key-must-be-at-least-32-bytes}

management:
  endpoints:
    web:
      exposure:
        include: health,info
