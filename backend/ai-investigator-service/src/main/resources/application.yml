server:
  port: 8084

spring:
  application:
    name: ai-investigator-service

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:chainguard-demo-secret-key-must-be-at-least-32-bytes}

ai:
  # 'mock' (default, offline) or 'external' (real Anthropic Messages API call).
  provider: ${AI_PROVIDER:mock}
  external:
    base-url: ${AI_EXTERNAL_BASE_URL:https://api.anthropic.com}
    api-key: ${AI_EXTERNAL_API_KEY:}
    model: ${AI_EXTERNAL_MODEL:claude-3-5-haiku-latest}
    version: ${AI_EXTERNAL_VERSION:2023-06-01}
    max-tokens: ${AI_EXTERNAL_MAX_TOKENS:1024}
    timeout-millis: ${AI_EXTERNAL_TIMEOUT_MILLIS:20000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
