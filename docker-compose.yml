services:
  postgres:
    image: postgres:16-alpine
    container_name: chainguard-postgres
    environment:
      POSTGRES_USER: chainguard
      POSTGRES_PASSWORD: chainguard
      POSTGRES_DB: chainguard_casehub
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: chainguard-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro

  redis:
    image: redis:7-alpine
    container_name: chainguard-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  mongo_data:
  redis_data:
